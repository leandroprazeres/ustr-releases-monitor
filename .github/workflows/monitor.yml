name: USTR Press Releases Monitor

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/5 * * * *'   # Executa a cada 5 minutos
  workflow_dispatch:        # Permite execução manual pelo painel do GitHub
    inputs:
      test_notify:
        description: 'Enviar um alerta de teste com o release mais recente'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

concurrency:
  group: ustr-release-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Rodar Testes
      run: pytest -q

    - name: Executar Monitor
      env:
        # Configurações de E-mail (SMTP)
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER || 'smtp.gmail.com' }}
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        MAIL_FROM: ${{ secrets.MAIL_FROM }}
        MAIL_TO: ${{ secrets.MAIL_TO }}
        SMTP_PORT: ${{ secrets.SMTP_PORT || '465' }}
        
        # Configurações de WhatsApp
        WHATSAPP_PROVIDER: ${{ secrets.WHATSAPP_PROVIDER || 'auto' }}
        CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
        CALLMEBOT_API_KEY: ${{ secrets.CALLMEBOT_API_KEY }}
        TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
        TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
        TWILIO_FROM_WHATSAPP: ${{ secrets.TWILIO_FROM_WHATSAPP }}
        TWILIO_TO_WHATSAPP: ${{ secrets.TWILIO_TO_WHATSAPP }}
        
        # Configurações de Push
        PUSH_PROVIDER: ${{ secrets.PUSH_PROVIDER || 'none' }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
        PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
        PUSHBULLET_ACCESS_TOKEN: ${{ secrets.PUSHBULLET_ACCESS_TOKEN }}
      run: |
        if [ "${{ github.event.inputs.test_notify }}" = "true" ] || [[ "${{ github.event.head_commit.message }}" == *"[test-notify]"* ]]; then
          python monitor.py --test-notify
        elif [[ "${{ github.event.head_commit.message }}" == *"[test-whatsapp]"* ]]; then
          python monitor.py --test-whatsapp
        else
          python monitor.py
        fi

    - name: Salvar Mudanças de Estado (state.json)
      run: |
        if git diff --quiet -- state.json; then
          echo "Nenhuma mudança no estado para commitar"
          exit 0
        fi
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add state.json
        git commit -m "Update state.json [skip ci]"
        git push
